name: Publish Core Package

on:
  push:
    branches:
      - main


permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build and Pack Projeto 1
        run: dotnet pack src/Fcg.Core.Abstractions/Fcg.Core.Abstractions.csproj -c Release -o ./out
      - name: Build and Pack Projeto 2
        run: dotnet pack src/Fcg.Core.SharedContracts/Fcg.Core.SharedContracts.csproj -c Release -o ./out
      - name: Build and Pack Projeto 3
        run: dotnet pack src/Fcg.Core.WebApi/Fcg.Core.WebApi.csproj -c Release -o ./out

      - name: Obter token OIDC para NuGet (Trusted Publishing)
        uses: actions/github-script@v7
        id: get_oidc_token
        with:
          script: |
            const token = await core.getIDToken('api.nuget.org')
            core.setSecret(token)
            core.setOutput('token', token)

      - name: Push to NuGet.org
        run: dotnet nuget push ./out/*.nupkg --api-key ${{ steps.get_oidc_token.outputs.token }} --source https://api.nuget.org/v3/index.json --skip-duplicate